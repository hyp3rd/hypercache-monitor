---
name: e2e

# Playwright end-to-end suite. Separate from the main `ci`
# workflow because (a) it pulls in a 100MB+ Chromium binary
# and (b) browser tests are intrinsically slower — splitting
# keeps the unit/lint/typecheck signal fast.
#
# The suite is hermetic: globalSetup spins up an in-process
# `node:http` cache stub on fixed ports (see
# `tests/e2e/fixtures/cache-stub.ts`); no Docker, no real
# cache binary, no flake from cluster bring-up.

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: playwright + axe
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install deps (frozen)
        run: npm ci

      - name: Install Playwright browsers
        # `--with-deps` pulls Linux system packages Chromium
        # needs (libgbm, libxcb-shm, …). On macOS / Windows
        # runners this would be wrong, but ubuntu-latest is
        # the only target here.
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: make e2e

      - name: Upload Playwright report
        # Even on green runs the report is useful for traces;
        # only upload on failure to keep storage tight.
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
